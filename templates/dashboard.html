<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Decision Support Dashboard</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --surface: #ffffff;
      --ink: #102a43;
      --muted: #486581;
      --accent: #0f766e;
      --warning: #b45309;
      --danger: #b91c1c;
      --radius: 16px;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 20%, #d9f3ef 0, var(--bg) 45%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .title {
      font-size: 1.8rem;
      margin: 0 0 6px;
    }
    .sub {
      color: var(--muted);
      margin: 0 0 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: 0 6px 20px rgba(16, 42, 67, 0.08);
    }
    .metric {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 4px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .table th, .table td {
      text-align: left;
      border-bottom: 1px solid #e6edf5;
      padding: 10px 8px;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .low { background: #0f766e; }
    .moderate { background: var(--warning); }
    .high { background: var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Real-Time Clinical Decision Support Dashboard</h1>
    <p class="sub">Probable conditions, confidence trends, explainability, and risk-stratification summary.</p>

    <div class="grid" id="metrics"></div>

    <div class="card">
      <h3>Recent Decision Support Cases</h3>
      <table class="table" id="recentTable">
        <thead>
          <tr>
            <th>Time</th>
            <th>Top Condition</th>
            <th>Confidence</th>
            <th>Risk</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    async function load() {
      const role = 'doctor';
      const res = await fetch('/api/dashboard/metrics', {
        headers: { 'X-Role': role }
      });
      const data = await res.json();
      const metrics = document.getElementById('metrics');
      metrics.innerHTML = '';

      const cards = [
        ['Total Cases', data.total_cases || 0],
        ['Avg Confidence', data.avg_confidence || 0],
        ['High Risk Cases', (data.risk_bands && data.risk_bands.high) || 0],
        ['Speed Gain %', data.benchmark && data.benchmark.triage_speed_gain_percent || 0]
      ];

      cards.forEach(([k, v]) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div>${k}</div><div class="metric">${v}</div>`;
        metrics.appendChild(div);
      });

      const tbody = document.querySelector('#recentTable tbody');
      tbody.innerHTML = '';
      (data.recent_cases || []).forEach(row => {
        const tr = document.createElement('tr');
        const risk = row.risk_band || 'low';
        tr.innerHTML = `
          <td>${row.timestamp || '-'}</td>
          <td>${row.top_condition || '-'}</td>
          <td>${row.confidence ?? '-'}</td>
          <td><span class="badge ${risk}">${risk}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
